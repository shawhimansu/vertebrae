<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Blast!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0c2e;
    --card: #1a1650;
    --accent1: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --accent4: #4d96ff;
    --accent5: #c77dff;
    --text: #ffffff;
    --text2: #b0b8ff;
  }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 3px; height: 3px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0.5;
  }
  @keyframes twinkle { to { opacity: 0.1; transform: scale(0.5); } }

  /* Planet decorations */
  .planet {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .planet1 { width: 120px; height: 120px; background: radial-gradient(circle at 35% 35%, #ff9a9e, #c0392b); top: -30px; right: -30px; }
  .planet2 { width: 80px; height: 80px; background: radial-gradient(circle at 35% 35%, #a8edea, #2980b9); bottom: 40px; left: -20px; }
  .planet3 { width: 50px; height: 50px; background: radial-gradient(circle at 35% 35%, #ffd700, #f39c12); top: 60px; left: 60px; opacity: 0.7; }

  /* Main wrapper */
  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 1rem;
    text-align: center;
  }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

  /* ── START SCREEN ── */
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 4rem;
    line-height: 1;
    color: var(--accent2);
    text-shadow: 0 0 30px rgba(255,217,61,0.5), 4px 4px 0 rgba(255,107,107,0.6);
    margin-bottom: 0.25rem;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  .tagline {
    font-size: 1.1rem;
    color: var(--text2);
    margin-bottom: 2rem;
    font-weight: 600;
  }

  .rocket-emoji { font-size: 3rem; display: block; margin-bottom: 1rem; animation: rocket 2s ease-in-out infinite; }
  @keyframes rocket { 0%,100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-12px) rotate(5deg); } }

  .level-label {
    font-size: 1rem;
    color: var(--text2);
    margin-bottom: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .level-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .level-btn {
    padding: 0.6rem 1.4rem;
    border-radius: 50px;
    border: 2.5px solid transparent;
    background: var(--card);
    color: var(--text2);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .level-btn:hover { transform: scale(1.05); }
  .level-btn.selected { color: var(--bg); }
  .level-btn[data-level="easy"].selected { background: var(--accent3); border-color: var(--accent3); }
  .level-btn[data-level="medium"].selected { background: var(--accent2); border-color: var(--accent2); }
  .level-btn[data-level="hard"].selected { background: var(--accent1); border-color: var(--accent1); }

  .start-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    padding: 0.9rem 3rem;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, var(--accent1), var(--accent5));
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,107,107,0.4);
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .start-btn:hover { transform: scale(1.06) translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,107,0.5); }
  .start-btn:active { transform: scale(0.97); }

  /* ── GAME SCREEN ── */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    background: var(--card);
    border-radius: 18px;
    padding: 0.75rem 1.25rem;
    border: 1.5px solid rgba(255,255,255,0.08);
  }

  .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hud-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text2); font-weight: 700; }
  .hud-value { font-family: 'Fredoka One', cursive; font-size: 1.6rem; line-height: 1; }
  #score-val { color: var(--accent2); }
  #lives-val { color: var(--accent1); letter-spacing: 2px; }
  #q-val { color: var(--accent4); }

  /* Timer ring */
  .timer-wrap { position: relative; width: 56px; height: 56px; }
  #timer-svg { transform: rotate(-90deg); position: absolute; top: 0; left: 0; }
  #timer-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 5; }
  #timer-arc { fill: none; stroke: var(--accent3); stroke-width: 5; stroke-linecap: round; stroke-dasharray: 138; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: var(--text);
  }

  /* Question card */
  .q-card {
    background: var(--card);
    border-radius: 24px;
    padding: 2rem 1.5rem 1.5rem;
    margin-bottom: 1.25rem;
    border: 2px solid rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(77,150,255,0.15), transparent 70%);
    pointer-events: none;
  }

  .streak-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 1rem;
  }
  .streak-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: all 0.3s;
  }
  .streak-dot.lit { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

  .emoji-hint { font-size: 2rem; margin-bottom: 0.5rem; display: block; }

  .question-text {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: white;
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  .question-text span { color: var(--accent2); }

  .q-type-badge {
    display: inline-block;
    padding: 3px 14px;
    border-radius: 50px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .badge-add { background: rgba(107,203,119,0.2); color: var(--accent3); }
  .badge-sub { background: rgba(255,107,107,0.2); color: var(--accent1); }
  .badge-mul { background: rgba(77,150,255,0.2); color: var(--accent4); }

  /* Answer buttons */
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .ans-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    padding: 1rem;
    border-radius: 18px;
    border: 2.5px solid rgba(255,255,255,0.1);
    background: var(--card);
    color: white;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .ans-btn:hover:not(:disabled) { transform: scale(1.04) translateY(-2px); border-color: var(--accent4); box-shadow: 0 4px 16px rgba(77,150,255,0.25); }
  .ans-btn:active:not(:disabled) { transform: scale(0.97); }
  .ans-btn.correct { background: var(--accent3); border-color: var(--accent3); animation: correctBump 0.4s ease; }
  .ans-btn.wrong { background: var(--accent1); border-color: var(--accent1); animation: shake 0.4s ease; }
  .ans-btn.reveal { background: rgba(107,203,119,0.2); border-color: var(--accent3); }

  @keyframes correctBump { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

  .feedback-msg {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    min-height: 1.8rem;
    transition: all 0.2s;
  }
  .feedback-msg.good { color: var(--accent3); }
  .feedback-msg.bad { color: var(--accent1); }

  /* ── END SCREEN ── */
  .result-emoji { font-size: 4rem; margin-bottom: 0.5rem; animation: bounce 1s ease infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }

  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: var(--accent2);
    margin-bottom: 0.4rem;
    text-shadow: 3px 3px 0 rgba(255,107,107,0.4);
  }

  .result-subtitle { font-size: 1rem; color: var(--text2); margin-bottom: 2rem; font-weight: 600; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card);
    border-radius: 16px;
    padding: 1rem 0.5rem;
    border: 1.5px solid rgba(255,255,255,0.08);
  }
  .stat-val { font-family: 'Fredoka One', cursive; font-size: 2rem; }
  .stat-lbl { font-size: 0.7rem; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

  .stars-row { font-size: 2rem; margin-bottom: 1.5rem; letter-spacing: 4px; }

  .end-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .btn-play-again {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 0.8rem 2rem;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, var(--accent3), var(--accent4));
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(77,150,255,0.3);
    transition: all 0.2s;
  }
  .btn-play-again:hover { transform: scale(1.06) translateY(-2px); }

  .btn-menu {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 0.8rem 2rem;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-menu:hover { border-color: var(--text2); color: white; transform: scale(1.04); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
    z-index: 999;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Progress bar */
  .progress-wrap { background: rgba(255,255,255,0.08); border-radius: 50px; height: 6px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 50px; background: linear-gradient(90deg, var(--accent4), var(--accent5)); transition: width 0.4s ease; }
</style>
</head>
<body>

<!-- Starfield -->
<div class="stars" id="stars"></div>

<!-- Planet decorations -->
<div class="planet planet1"></div>
<div class="planet planet2"></div>
<div class="planet planet3"></div>

<div id="app">

  <!-- START SCREEN -->
  <div class="screen active" id="start-screen">
    <span class="rocket-emoji">🚀</span>
    <div class="logo">Math Blast!</div>
    <div class="tagline">Blast through numbers at warp speed!</div>

    <div class="level-label">Choose your mission</div>
    <div class="level-btns">
      <button class="level-btn selected" data-level="easy" onclick="selectLevel('easy')">Easy</button>
      <button class="level-btn" data-level="medium" onclick="selectLevel('medium')">Medium</button>
      <button class="level-btn" data-level="hard" onclick="selectLevel('hard')">Hard</button>
    </div>

    <button class="start-btn" onclick="startGame()">🚀 Launch!</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="game-screen">

    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="score-val">0</div>
      </div>
      <div class="timer-wrap">
        <svg id="timer-svg" width="56" height="56" viewBox="0 0 56 56">
          <circle id="timer-bg" cx="28" cy="28" r="22"/>
          <circle id="timer-arc" cx="28" cy="28" r="22"/>
        </svg>
        <div class="timer-num" id="timer-num">10</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Lives</div>
        <div class="hud-value" id="lives-val">❤️❤️❤️</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Q</div>
        <div class="hud-value" id="q-val">1/10</div>
      </div>
    </div>

    <div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>

    <div class="q-card">
      <div class="streak-bar" id="streak-bar">
        <div class="streak-dot" id="sd0"></div>
        <div class="streak-dot" id="sd1"></div>
        <div class="streak-dot" id="sd2"></div>
      </div>
      <span class="emoji-hint" id="emoji-hint">🌟</span>
      <div class="question-text" id="question-text">5 + 3 = <span>?</span></div>
      <span class="q-type-badge badge-add" id="q-badge">Addition</span>
    </div>

    <div class="answers" id="answers"></div>
    <div class="feedback-msg" id="feedback-msg"></div>
  </div>

  <!-- END SCREEN -->
  <div class="screen" id="end-screen">
    <div class="result-emoji" id="result-emoji">🏆</div>
    <div class="result-title" id="result-title">Incredible!</div>
    <div class="result-subtitle" id="result-subtitle">You're a math superstar!</div>
    <div class="stars-row" id="stars-row">⭐⭐⭐</div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" style="color:var(--accent2)" id="end-score">0</div>
        <div class="stat-lbl">Score</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--accent3)" id="end-correct">0</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--accent4)" id="end-best">0</div>
        <div class="stat-lbl">Best Streak</div>
      </div>
    </div>

    <div class="end-btns">
      <button class="btn-play-again" onclick="startGame()">Play Again!</button>
      <button class="btn-menu" onclick="showScreen('start-screen')">Menu</button>
    </div>
  </div>

</div>

<script>
// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*3}s;opacity:${0.2+Math.random()*0.6};width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;animation-delay:${Math.random()*3}s`;
  starsEl.appendChild(s);
}

// ── State ──
let level = 'easy';
let score = 0, lives = 3, qIndex = 0, streak = 0, bestStreak = 0;
let totalQuestions = 10, correctCount = 0;
let questions = [];
let timerVal = 10, timerInterval;
let answered = false;

const LEVEL_CONFIG = {
  easy:   { max: 10,  ops: ['+', '-'],      time: 12, points: 10 },
  medium: { max: 20,  ops: ['+', '-', '×'], time: 10, points: 15 },
  hard:   { max: 30,  ops: ['+', '-', '×'], time: 8,  points: 20 }
};

const EMOJIS_ADD = ['🍎','🌟','🎈','🐶','🌈','⭐','🎉','🦋','🍕','🌸'];
const EMOJIS_SUB = ['🚀','🌙','🎮','🦖','🏆','🎯','💎','🦄','🌊','🎪'];
const EMOJIS_MUL = ['🔥','⚡','💥','🎲','🎸','🏅','🦊','🌺','🍀','🎭'];
const FEEDBACK_GOOD = ['Amazing! 🎉','Awesome! ⭐','You rock! 🤘','Brilliant! 💡','Superstar! 🌟','Perfect! ✨','Wow! 🎊','Fantastic! 🚀'];
const FEEDBACK_BAD  = ['Try again! 💪','Keep going! 🌈','You got this! ❤️','Almost! 🎯','Next one! ⚡'];

function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function genQuestion() {
  const cfg = LEVEL_CONFIG[level];
  const op = cfg.ops[rand(0, cfg.ops.length - 1)];
  let a, b, answer;

  if (op === '+') {
    a = rand(1, cfg.max); b = rand(1, cfg.max);
    answer = a + b;
  } else if (op === '-') {
    a = rand(2, cfg.max); b = rand(1, a);
    answer = a - b;
  } else {
    a = rand(2, cfg.max <= 10 ? 5 : 10); b = rand(2, 5);
    answer = a * b;
  }

  // Generate 3 wrong answers
  const wrong = new Set();
  while (wrong.size < 3) {
    let w = answer + rand(-5, 5);
    if (w !== answer && w >= 0) wrong.add(w);
  }

  const choices = [...wrong, answer].sort(() => Math.random() - 0.5);
  const emoji = op === '+' ? EMOJIS_ADD[rand(0,9)] : op === '-' ? EMOJIS_SUB[rand(0,9)] : EMOJIS_MUL[rand(0,9)];

  return { a, b, op, answer, choices, emoji };
}

function buildQuestions() {
  questions = [];
  for (let i = 0; i < totalQuestions; i++) questions.push(genQuestion());
}

function selectLevel(l) {
  level = l;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`[data-level="${l}"]`).classList.add('selected');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  score = 0; lives = 3; qIndex = 0; streak = 0; bestStreak = 0; correctCount = 0;
  buildQuestions();
  showScreen('game-screen');
  renderQuestion();
}

function renderQuestion() {
  if (qIndex >= totalQuestions) { endGame(); return; }
  answered = false;
  const q = questions[qIndex];
  const opSymbol = q.op;

  document.getElementById('score-val').textContent = score;
  document.getElementById('lives-val').textContent = '❤️'.repeat(lives);
  document.getElementById('q-val').textContent = `${qIndex+1}/${totalQuestions}`;
  document.getElementById('prog-bar').style.width = `${(qIndex/totalQuestions)*100}%`;
  document.getElementById('emoji-hint').textContent = q.emoji;
  document.getElementById('question-text').innerHTML = `${q.a} ${opSymbol} ${q.b} = <span>?</span>`;
  document.getElementById('feedback-msg').textContent = '';
  document.getElementById('feedback-msg').className = 'feedback-msg';

  const badge = document.getElementById('q-badge');
  if (q.op === '+') { badge.textContent = 'Addition'; badge.className = 'q-type-badge badge-add'; }
  else if (q.op === '-') { badge.textContent = 'Subtraction'; badge.className = 'q-type-badge badge-sub'; }
  else { badge.textContent = 'Multiply'; badge.className = 'q-type-badge badge-mul'; }

  // Streak dots
  for (let i = 0; i < 3; i++) {
    const d = document.getElementById('sd' + i);
    d.className = 'streak-dot' + (streak > i ? ' lit' : '');
  }

  // Answers
  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  q.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = c;
    btn.onclick = () => pickAnswer(btn, c, q.answer);
    answersEl.appendChild(btn);
  });

  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  const maxTime = LEVEL_CONFIG[level].time;
  timerVal = maxTime;
  updateTimerUI(timerVal, maxTime);

  timerInterval = setInterval(() => {
    timerVal--;
    updateTimerUI(timerVal, maxTime);
    if (timerVal <= 0) {
      clearInterval(timerInterval);
      if (!answered) timeUp();
    }
  }, 1000);
}

function updateTimerUI(val, max) {
  document.getElementById('timer-num').textContent = val;
  const arc = document.getElementById('timer-arc');
  const pct = val / max;
  arc.style.strokeDashoffset = 138 * (1 - pct);
  arc.style.stroke = pct > 0.5 ? 'var(--accent3)' : pct > 0.25 ? 'var(--accent2)' : 'var(--accent1)';
}

function timeUp() {
  answered = true;
  lives--;
  streak = 0;
  const fb = document.getElementById('feedback-msg');
  fb.textContent = `⏰ Time's up! Answer: ${questions[qIndex].answer}`;
  fb.className = 'feedback-msg bad';
  highlightCorrect();
  if (lives <= 0) { setTimeout(endGame, 1200); return; }
  setTimeout(() => { qIndex++; renderQuestion(); }, 1400);
}

function pickAnswer(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const allBtns = document.querySelectorAll('.ans-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback-msg');

  if (chosen === correct) {
    btn.classList.add('correct');
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    correctCount++;
    const bonus = streak >= 3 ? 2 : 1;
    const pts = LEVEL_CONFIG[level].points * bonus;
    score += pts;
    fb.textContent = (streak >= 3 ? `🔥 x${streak} Streak! +${pts}pts  ` : '') + FEEDBACK_GOOD[rand(0, FEEDBACK_GOOD.length-1)];
    fb.className = 'feedback-msg good';

    // Update streak dots
    for (let i = 0; i < 3; i++) {
      const d = document.getElementById('sd' + i);
      if (streak > i) d.classList.add('lit');
    }

    setTimeout(() => { qIndex++; renderQuestion(); }, 900);
  } else {
    btn.classList.add('wrong');
    streak = 0;
    lives--;
    fb.textContent = FEEDBACK_BAD[rand(0, FEEDBACK_BAD.length-1)] + ` Ans: ${correct}`;
    fb.className = 'feedback-msg bad';
    highlightCorrect();
    if (lives <= 0) { setTimeout(endGame, 1200); return; }
    setTimeout(() => { qIndex++; renderQuestion(); }, 1400);
  }

  document.getElementById('score-val').textContent = score;
  document.getElementById('lives-val').textContent = '❤️'.repeat(Math.max(0, lives));
}

function highlightCorrect() {
  document.querySelectorAll('.ans-btn').forEach(b => {
    if (parseInt(b.textContent) === questions[qIndex].answer) b.classList.add('reveal');
  });
}

function endGame() {
  clearInterval(timerInterval);
  showScreen('end-screen');

  document.getElementById('end-score').textContent = score;
  document.getElementById('end-correct').textContent = `${correctCount}/${totalQuestions}`;
  document.getElementById('end-best').textContent = bestStreak;

  const pct = correctCount / totalQuestions;
  let emoji, title, subtitle, stars;
  if (pct >= 0.9) { emoji='🏆'; title='Incredible!'; subtitle="You're a Math Champion! 🌟"; stars='⭐⭐⭐'; launchConfetti(); }
  else if (pct >= 0.7) { emoji='🎉'; title='Great Job!'; subtitle="You're a Math Superstar! 🚀"; stars='⭐⭐⭐'; launchConfetti(); }
  else if (pct >= 0.5) { emoji='👍'; title='Good Work!'; subtitle='Keep practising, you\'re getting there! 💪'; stars='⭐⭐'; }
  else { emoji='🌈'; title='Keep Going!'; subtitle='Every champion starts somewhere! ❤️'; stars='⭐'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-subtitle').textContent = subtitle;
  document.getElementById('stars-row').textContent = stars;
}

function launchConfetti() {
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f43'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `left:${Math.random()*100}vw;background:${colors[~~(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*1}s`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 30);
  }
}
</script>
